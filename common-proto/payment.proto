syntax = "proto3";

package common_proto;

option go_package = "/paymentpb";

enum EscrowStatus {
    ESCROW_STATUS_HELD = 0;
    ESCROW_STATUS_RELEASED = 1;
    ESCROW_STATUS_REFUNDED = 2;
    ESCROW_STATUS_PARTIAL_REFUNDED = 3;
    ESCROW_STATUS_DISPUTED = 4;
}

message WalletRequest {
    string user_id = 1;
}

message WalletResponse {
    bool success = 1;
}

message EscrowRequest {
    string contract_id = 1;
    string dispute_id = 2;
    string customer_id = 3;
    string freelancer_id = 4;
    string amount = 5;
    EscrowStatus status = 6;
}

message EscrowResponse {
    bool success = 1;
}

message BalanceRequest {
    string user_id = 1;
    string amount = 2;
}

message BalanceResponse {
    bool valid = 1;
}

service PaymentService {
    rpc CreateWallet (WalletRequest) returns (WalletResponse);
    rpc CheckBalance (BalanceRequest) returns (BalanceResponse);
    rpc CreateEscrow (EscrowRequest) returns (EscrowResponse);
    rpc ProcessEscrow (EscrowRequest) returns (EscrowResponse);
}