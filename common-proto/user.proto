syntax = "proto3";

package common_proto;

option go_package = "/userpb";

message CreateUserRequest {
  string account_id = 1;
  string full_name = 2;
  string role = 3;
}

message CreateUserResponse {
  string user_id = 1;
}

service UserService {
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
}